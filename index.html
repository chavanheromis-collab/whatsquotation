<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavan Motors - Quotation</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;margin:0;
}
.container{max-width:450px;width:100%;padding:20px;}
.card{
  background:white;padding:22px;border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
.image-container{
  min-height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.quote-img{
  width:100%;
  max-height:500px;
  object-fit:contain;
}
.btn{
  width:100%;
  padding:16px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:16px;
}
.info-box{
  background:#f8f9fa;
  padding:15px;
  border-radius:12px;
  font-size:13px;
  margin-top:15px;
}
.info-box ol{padding-left:18px;line-height:1.7;}

.loading{
  text-align:center;
  padding:40px 20px;
}
.loading h2{
  font-size:24px;
  color:#333;
}
.big-model{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
  text-align:center;
  color:#444;
}
.error{text-align:center;padding:20px;}
</style>
</head>

<body>

<div class="container">
<div class="card">
<h2>🚗 Chavan Motors</h2>

<div id="content">

<div class="loading">
  <h2>⏳ Preparing Your Quotation...</h2>
</div>

</div>
</div>
</div>

<script>

// ===== PARAMS =====
const params = new URLSearchParams(window.location.search);
const customer = params.get("cust");
const name = params.get("custname");
const dse = params.get("dse");
const dsemob = params.get("dsemob");

// ===== CACHE =====
const CACHE_KEY = "quotation_cache";

// ===== DRIVE HANDLER =====
function formatDriveUrls(id) {
  if (!id) return null;
  id = id.trim();

  if (id.startsWith("http")) return { img:id, full:id };

  return {
    img:`https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
    full:`https://drive.google.com/uc?export=view&id=${id}`
  };
}

// ===== FETCH WITH CACHE =====
async function fetchSheetData(customerNumber) {

  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    const parsed = JSON.parse(cached);
    if (Date.now() - parsed.time < 30000) {
      return parsed.data;
    }
  }

  const apiUrl = "https://script.google.com/macros/s/AKfycbyr70myZuDAfCsVCdPlNcgskFTydg236p6kdNrbnB_1JaFvIRL2ckXbB_zruGk7orrg4w/exec?cust=" + customerNumber;

  const res = await fetch(apiUrl);
  const data = await res.json();

  if (data.error) throw new Error();

  localStorage.setItem(CACHE_KEY, JSON.stringify({
    time: Date.now(),
    data
  }));

  return data;
}

// ===== PRELOAD =====
function preloadImages(models) {
  return Promise.all(models.map(m => {
    return new Promise(resolve => {
      if (!m.data) return resolve();

      const img = new Image();
      img.src = m.data.img;
      img.onload = resolve;
      img.onerror = resolve;
    });
  }));
}

// ===== INIT =====
init();

async function init() {
  try {
    const data = await fetchSheetData(customer);

    const models = [
      {data: formatDriveUrls(data.url1), label:"🚘 Model 1"},
      {data: formatDriveUrls(data.url2), label:"🚘 Model 2"},
      {data: formatDriveUrls(data.url3), label:"🚘 Model 3"}
    ];

    await preloadImages(models);

    loadImages(models);

  } catch {
    showNoDataInstructions();
  }
}

// ===== LOAD IMAGES =====
function loadImages(models) {

  let html = "";

  models.forEach((m)=>{
    if(!m.data) return;

    html += `
    <div class="card">
      <div class="big-model">${m.label}</div>
      <div class="image-container" onclick="window.open('${m.data.full}','_blank')">
        <img class="quote-img" src="${m.data.img}">
      </div>
    </div>`;
  });

  html += `
  <div class="card">
    <button class="btn" onclick="sendWhatsApp()">💬 Send WhatsApp</button>

    <div class="info-box">
      <strong>📤 How to share image (NO LINK):</strong>
      <ol>
        <li>👆 Tap image → open full screen</li>
        <li>📱 Long press</li>
        <li>📤 Tap Share</li>
        <li>🟢 Select WhatsApp</li>
        <li>✅ Send to customer</li>
      </ol>
    </div>
  </div>`;

  document.getElementById("content").innerHTML = html;

  // SMART FALLBACK
  document.querySelectorAll(".quote-img").forEach(img=>{
    img.onerror = function(){
      img.src = img.src.replace("thumbnail","uc?export=view&id=");
    };
  });
}

// ===== WHATSAPP =====
function sendWhatsApp(){

const message = `🙏 Hello ${name},

Welcome to *Chavan Automobiles* 🚘

Please find your quotation attached 📄.
For any queries, Feel free to Contact.

For quick support, contact:
👤 ${dse || 'Sales Executive'}
📞 ${dsemob || 'Contact Number'}

Thank you for choosing us!
*Chavan Automobiles Team*`;

window.location.href =
`https://wa.me/${customer}?text=${encodeURIComponent(message)}`;
}

// ===== NO DATA =====
function showNoDataInstructions(){
document.getElementById("content").innerHTML =
`
<div class="card">
  <div class="error">
    <h3>⚠️ Quotation Not Found</h3>
  </div>

  <div class="info-box">
    <ol>
      <li>📱 Open AppSheet</li>
      <li>👤 Select Customer Name</li>
      <li>✏️ Tap Edit</li>
      <li>💾 Save</li>
      <li>🔄 Open link again</li>
    </ol>
  </div>
</div>`;
}

</script>

</body>
</html>
