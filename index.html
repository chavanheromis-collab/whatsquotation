<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavan Motors - Quotation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.container{max-width:450px;width:100%;padding:20px;}
.card{
  background:white;border-radius:20px;padding:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  margin-bottom:20px;
}
.header{text-align:center;margin-bottom:20px;}
.model-label{
  background:#667eea;color:white;padding:8px;border-radius:8px;
  text-align:center;margin-bottom:10px;font-weight:bold;
}
.image-container{
  margin:15px 0;border-radius:12px;overflow:hidden;
  background:#f5f5f5;min-height:200px;
  display:flex;align-items:center;justify-content:center;
}
.quote-img{width:100%;max-height:500px;object-fit:contain;}
.loading{text-align:center;padding:40px;color:#999;}
.spinner{
  border:3px solid #eee;border-top:3px solid #667eea;
  border-radius:50%;width:40px;height:40px;
  animation:spin 1s linear infinite;margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg);}}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:600;}
.btn-whatsapp{background:#25D366;color:white;}
.error{text-align:center;padding:30px;}
</style>
</head>

<body>
<div class="container">
<div class="card">
<div class="header">
<h2>🚗 Chavan Motors</h2>
<p>Your Quotation is Ready</p>
</div>

<div id="content">
<div class="loading">
<div class="spinner"></div>
<p>Loading quotations...</p>
</div>
</div>

</div>
</div>

<script>

// ===== PARAMS =====
const params = new URLSearchParams(window.location.search);
const customer = params.get("cust");
const name = params.get("custname");
const dse = params.get("dse");
const dsemob = params.get("dsemob");

// ===== FETCH FROM APPS SCRIPT =====
async function fetchSheetData(customerNumber) {

  const apiUrl = "https://script.google.com/macros/s/AKfycbyr70myZuDAfCsVCdPlNcgskFTydg236p6kdNrbnB_1JaFvIRL2ckXbB_zruGk7orrg4w/exec?cust=" + customerNumber;

  const res = await fetch(apiUrl);
  const data = await res.json();

  if (data.error) throw new Error();

  return data;
}

// ===== COUNTDOWN =====
function getRemainingSeconds() {
  if (!window.sheetTimestamp) return 15;

  const created = new Date(window.sheetTimestamp).getTime();
  const now = new Date().getTime();

  return Math.max(15 - Math.floor((now - created)/1000), 0);
}

// ===== INIT =====
init();

async function init() {
  try {
    const data = await fetchSheetData(customer);

    window.fileId1 = data.url1;
    window.fileId2 = data.url2;
    window.fileId3 = data.url3;
    window.sheetTimestamp = data.timestamp;

    loadImages();

  } catch {
    showError("No data found", "Check customer number");
  }
}

// ===== LOAD IMAGES =====
function loadImages() {

  const models = [
    {id:fileId1,label:"Model 1"},
    {id:fileId2,label:"Model 2"},
    {id:fileId3,label:"Model 3"}
  ];

  let html="";
  let count=0;

  models.forEach((m,i)=>{
    if(!m.id) return;

    count++;

    html+=`
    <div class="card">
      <div class="model-label">${m.label}</div>
      <div class="image-container">
        <img class="quote-img" src="${m.id}">
      </div>
    </div>`;
  });

  html+=`
  <div class="card">
    <button class="btn btn-whatsapp" onclick="sendWhatsApp()">💬 Send WhatsApp</button>
  </div>`;

  document.getElementById("content").innerHTML=html;

  // ERROR → COUNTDOWN
  document.querySelectorAll(".quote-img").forEach((img,i)=>{

    img.onerror=function(){

      let sec=getRemainingSeconds();
      const parent=this.parentElement;

      if(sec<=0){
        parent.innerHTML=`<img class="quote-img" src="${img.src}">`;
        return;
      }

      parent.innerHTML=`
      <div class="error">
        ⏳ Retry in <span id="t${i}">${sec}</span>s
      </div>`;

      const el=document.getElementById(`t${i}`);

      const timer=setInterval(()=>{
        sec--;
        el.textContent=sec;

        if(sec<=0){
          clearInterval(timer);
          parent.innerHTML=`<img class="quote-img" src="${img.src}">`;
        }
      },1000);
    };

  });
}

// ===== WHATSAPP =====
function sendWhatsApp(){
const msg=`🙏 Hello ${name},

Welcome to *Chavan Automobiles* 🚘

Please find your quotation.

👤 ${dse}
📞 ${dsemob}

Thank you!`;

window.location.href=`https://wa.me/${customer}?text=${encodeURIComponent(msg)}`;
}

// ===== ERROR =====
function showError(t,m){
document.getElementById("content").innerHTML=`<div class="error"><h3>${t}</h3><p>${m}</p></div>`;
}

</script>
</body>
</html>
