<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chavan Automobiles - Quotation</title>

  <style>
    body{
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
      padding:12px;
      box-sizing:border-box;
    }

    .container{
      max-width:450px;
      width:100%;
      padding:10px;
      box-sizing:border-box;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:20px;
      margin-bottom:20px;
      box-shadow:0 15px 40px rgba(0,0,0,0.25);
      box-sizing:border-box;
    }

    .loading{
      text-align:center;
      padding:40px 10px;
    }

    .loading h1,
    .loading h2{
      font-size:22px;
      margin-bottom:15px;
    }

    .loading p{
      font-size:18px;
      color:#555;
      margin:0;
    }

    .model-title{
      font-size:18px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .image-container{
      min-height:200px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      border-radius:14px;
      overflow:hidden;
      background:#f8f9fa;
    }

    .quote-img{
      width:100%;
      max-height:500px;
      object-fit:contain;
      display:block;
      border-radius:12px;
    }

    .btn{
      width:100%;
      padding:15px;
      background:#25D366;
      color:white;
      border:none;
      border-radius:12px;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
    }

    .btn:active{
      transform:scale(0.99);
    }

    .info-box{
      background:#f8f9fa;
      padding:15px;
      border-radius:12px;
      font-size:15px;
      margin-top:15px;
      line-height:1.5;
    }

    .highlight{
      background:#fff3cd;
      color:#856404;
      padding:6px 10px;
      border-radius:8px;
      font-weight:bold;
      display:inline-block;
    }

    .error{
      text-align:center;
      padding:20px;
    }

    ol{
      padding-left:20px;
      margin-bottom:0;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div id="content">
        <div class="loading">
          <h1>⏳ Preparing Your Quotation...</h1>
          <p id="loadingText">🔍 Checking your details...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // PARAMS
    // =========================
    const params = new URLSearchParams(window.location.search);
    const customer = params.get("cust") || "";
    const row = params.get("row") || "";
    const name = params.get("custname") || "Customer";
    const dse = params.get("dse") || "";
    const dsemob = params.get("dsemob") || "";

    // =========================
    // CONFIG
    // =========================
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyr70myZuDAfCsVCdPlNcgskFTydg236p6kdNrbnB_1JaFvIRL2ckXbB_zruGk7orrg4w/exec";
    const CACHE_KEY = `quoteData_${row}_${customer}`;
    const FETCH_TIMEOUT_MS = 5000;

    // =========================
    // LOADING TEXT
    // =========================
    const msgs = [
      "🔍 Checking your details...",
      "📱 Verifying customer record...",
      "📂 Fetching quotation data...",
      "🖼️ Preparing images...",
      "🚀 Almost ready..."
    ];

    let i = 0;
    let interval = setInterval(() => {
      const el = document.getElementById("loadingText");
      if (el) {
        el.textContent = msgs[i];
        i = (i + 1) % msgs.length;
      }
    }, 1200);

    // =========================
    // HELPERS
    // =========================
    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function stopLoadingText() {
      if (interval) {
        clearInterval(interval);
        interval = null;
      }
    }

    function safeJsonParse(value) {
      try {
        return JSON.parse(value);
      } catch (_) {
        return null;
      }
    }

    function getCachedData() {
      const raw = sessionStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      return safeJsonParse(raw);
    }

    function setCachedData(data) {
      try {
        sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
      } catch (_) {}
    }

    function googleThumb(fileId) {
      return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
    }

    function googleView(fileId) {
      return `https://drive.google.com/uc?export=view&id=${fileId}`;
    }

    function preloadFirstImage(data) {
      if (data && data.url1) {
        const img = new Image();
        img.src = googleThumb(data.url1);
      }
    }

    // =========================
    // FETCH
    // =========================
    async function fetchData() {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

      try {
        const url = `${WEBAPP_URL}?cust=${encodeURIComponent(customer)}&row=${encodeURIComponent(row)}`;

        const res = await fetch(url, {
          method: "GET",
          cache: "no-store",
          signal: controller.signal
        });

        clearTimeout(timeout);

        if (!res.ok) {
          throw new Error("Network response failed");
        }

        const data = await res.json();

        if (data.error) {
          throw new Error(data.error);
        }

        setCachedData(data);
        return data;

      } catch (err) {
        clearTimeout(timeout);

        const cached = getCachedData();
        if (cached) {
          return cached;
        }

        throw err;
      }
    }

    // =========================
    // TIME CHECK
    // =========================
    function handleTime(timestamp) {
      const now = new Date();
      const ts = new Date(timestamp);
      const diff = (now - ts) / 1000;

      if (isNaN(ts.getTime())) {
        return false;
      }

      if (diff < 30) {
        let sec = 10;

        document.getElementById("content").innerHTML = `
          <div class="loading">
            <h2>⏳ Generating Quotation...</h2>
            <p>⏱️ Please wait <span id="count">${sec}</span> sec</p>
          </div>
        `;

        const int = setInterval(() => {
          sec--;
          const countEl = document.getElementById("count");
          if (countEl) {
            countEl.innerText = sec;
          }

          if (sec <= 0) {
            clearInterval(int);
            init(true); // retry without full page reload
          }
        }, 1000);

        return true;
      }

      if (diff < 60) {
        document.getElementById("content").innerHTML = `
          <div class="card">
            <h3>🚀 Quotation Ready</h3>
            <p>🔄 Please wait a moment, rechecking...</p>
          </div>
        `;

        setTimeout(() => init(true), 3000);
        return true;
      }

      return false;
    }

    // =========================
    // INIT
    // =========================
    init(false);

    async function init(isRetry) {
      try {
        if (!isRetry) {
          const cached = getCachedData();
          if (cached) {
            stopLoadingText();
            load(cached);
          }
        }

        const data = await fetchData();
        stopLoadingText();

        preloadFirstImage(data);

        if (handleTime(data.timestamp)) {
          return;
        }

        load(data);

      } catch (err) {
        stopLoadingText();
        noData();
      }
    }

    // =========================
    // LOAD DATA
    // =========================
    function load(data) {
      let html = "";

      function renderModel(model, url, label) {
        if (model && !url) {
          return `
            <div class="card">
              <div class="model-title">${escapeHtml(label)} - ${escapeHtml(model)}</div>
              <p>⚠️ Quotation not generated</p>

              <div class="info-box">
                📱 Go to AppSheet → <br><br>
                👉 <span class="highlight">Select Customer ${escapeHtml(name)}</span><br>
                ✏️ Edit → Save → Reopen
              </div>
            </div>
          `;
        }

        if (url) {
          const img = googleThumb(url);
          const full = googleView(url);

          return `
            <div class="card">
              <div class="model-title">${escapeHtml(label)}${model ? " - " + escapeHtml(model) : ""}</div>

              <div class="image-container" onclick="window.open('${full}','_blank')">
                <img class="quote-img" src="${img}" loading="lazy" alt="${escapeHtml(label)}">
              </div>
            </div>
          `;
        }

        return "";
      }

      html += renderModel(data.model1, data.url1, "🚘 Model 1");
      html += renderModel(data.model2, data.url2, "🚘 Model 2");
      html += renderModel(data.model3, data.url3, "🚘 Model 3");

      html += `
        <div class="card">
          <button class="btn" onclick="send()">💬 Send WhatsApp</button>

          <div class="info-box">
            <strong>📤 How to share Quotation:</strong>
            <ol>
              <li>👆 Long Press on image</li>
              <li>📋 Copy Image</li>
              <li>📤 Share → WhatsApp</li>
              <li>✅ Send</li>
            </ol>
          </div>
        </div>
      `;

      document.getElementById("content").innerHTML = html;

      // IMAGE FALLBACK
      document.querySelectorAll(".quote-img").forEach(img => {
        img.onerror = function () {
          if (!this.dataset.fallbackDone) {
            this.dataset.fallbackDone = "1";
            const currentSrc = this.src;
            const match = currentSrc.match(/id=([^&]+)/);
            if (match && match[1]) {
              this.src = googleView(match[1]);
            }
          }
        };
      });
    }

    // =========================
    // WHATSAPP
    // =========================
    function send() {
      const msg = `🙏 Hello ${name},

Welcome to *Chavan Automobiles* 🚘

Please find your quotation attached 📄.
For any queries, Feel free to Contact.

For quick support, contact:
👤 ${dse || 'Sales Executive'}
📞 ${dsemob || 'Contact Number'}

Thank you for choosing us!
*Chavan Automobiles Team*`;

      window.open(
        `https://wa.me/${customer}?text=${encodeURIComponent(msg)}`,
        "_blank"
      );
    }

    // =========================
    // NO DATA
    // =========================
    function noData() {
      document.getElementById("content").innerHTML = `
        <div class="card error">
          <h3>⚠️ Quotation Not Found</h3>
          <p>📱 Go to AppSheet → ✏️ Edit → Save → Reopen</p>
        </div>
      `;
    }
  </script>
</body>
</html>
