<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavan Motors - Quotation</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;margin:0;
}
.container{max-width:450px;width:100%;padding:20px;}
.card{
  background:white;padding:20px;border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
.loading{text-align:center;padding:40px 10px;}
.error{text-align:center;padding:20px;}
.model-title{font-size:18px;font-weight:bold;margin-bottom:10px;}
.image-container{
  min-height:200px;display:flex;
  align-items:center;justify-content:center;
  cursor:pointer;
}
.quote-img{
  width:100%;max-height:500px;object-fit:contain;
}
.btn{
  width:100%;padding:15px;
  background:#25D366;color:white;
  border:none;border-radius:12px;font-weight:bold;
}
.info-box{
  background:#f8f9fa;padding:15px;
  border-radius:12px;font-size:16px;margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">
<div id="content">
<div class="loading">
  <h1>⏳ Preparing Your Quotation...</h1>
  <p id="loadingText">🔍 Checking your details...</p>
</div>
</div>
</div>
</div>

<script>

// PARAMS
const params = new URLSearchParams(window.location.search);
const customer = params.get("cust");
const row = params.get("row");
const name = params.get("custname");
const dse = params.get("dse");
const dsemob = params.get("dsemob");

// LOADING TEXT
const msgs = [
  "🔍 Checking your details...",
  "📱 Verifying customer record...",
  "📂 Fetching quotation data...",
  "🖼️ Preparing images...",
  "🚀 Almost ready..."
];

let i=0;
const interval=setInterval(()=>{
  const el=document.getElementById("loadingText");
  if(el){
    el.textContent=msgs[i];
    i=(i+1)%msgs.length;
  }
},1200);

// DRIVE FORMAT
function formatDriveUrls(id){
  if(!id) return null;
  id=id.trim();
  return {
    img:`https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
    full:`https://drive.google.com/uc?export=view&id=${id}`
  };
}

// FETCH
async function fetchData(){
  const url=`https://script.google.com/macros/s/AKfycbyr70myZuDAfCsVCdPlNcgskFTydg236p6kdNrbnB_1JaFvIRL2ckXbB_zruGk7orrg4w/exec?cust=${customer}&row=${row}`;
  const res=await fetch(url);
  const data=await res.json();
  if(data.error) throw new Error();
  return data;
}

// INIT
init();

async function init(){
  try{
    const data = await fetchData();

    const models = [
      { data: formatDriveUrls(data.url1), label:"🚘 Model 1", selected:data.model1 },
      { data: formatDriveUrls(data.url2), label:"🚘 Model 2", selected:data.model2 },
      { data: formatDriveUrls(data.url3), label:"🚘 Model 3", selected:data.model3 }
    ];

    clearInterval(interval);
    load(models);

  }catch{
    clearInterval(interval);
    noData();
  }
}

// LOAD LOGIC
function load(models){

let html = "";
let showGuide = false;

models.forEach(m => {

  // 🚨 selected but no pdf
  if (m.selected && !m.data) {
    showGuide = true;
    return;
  }

  if (!m.data) return;

  html += `
  <div class="card">
    <div class="model-title">${m.label}</div>
    <div class="image-container" onclick="window.open('${m.data.full}','_blank')">
      <img class="quote-img" src="${m.data.img}">
    </div>
  </div>`;
});

// 🚨 SHOW GUIDE
if (showGuide) {
  html = `
  <div class="card error">
    <h3>⚠️ Quotation Not Ready</h3>
    <p>📱 Go to AppSheet → Select Customer → ✏️ Edit → Save → Reopen</p>
  </div>`;
} else {
  html += `
  <div class="card">
    <button class="btn" onclick="send()">💬 Send WhatsApp</button>

    <div class="info-box">
    <strong>📤 How to share Quotation:</strong>
    <ol>
    <li>👆 Long Press on image</li>
    <li>📋 Copy Image</li>
    <li>📤 Share → WhatsApp</li>
    <li>✅ Send</li>
    </ol>
    </div>
  </div>`;
}

document.getElementById("content").innerHTML = html;

// fallback image fix
document.querySelectorAll(".quote-img").forEach(img=>{
  img.onerror=function(){
    img.src=img.src.replace("thumbnail","uc?export=view&id=");
  };
});

}

// WHATSAPP
function send(){

const msg=`🙏 Hello ${name},

Welcome to *Chavan Automobiles* 🚘

Please find your quotation attached 📄.
For any queries, Feel free to Contact.

For quick support, contact:
👤 ${dse || 'Sales Executive'}
📞 ${dsemob || 'Contact Number'}

Thank you for choosing us!
*Chavan Automobiles Team*`;

window.location.href=`https://wa.me/${customer}?text=${encodeURIComponent(msg)}`;
}

// NO DATA
function noData(){
document.getElementById("content").innerHTML=
`<div class="card error">
<h3>⚠️ Quotation Not Found</h3>
<p>📱 Go to AppSheet → Select Customer → ✏️ Edit → Save → Reopen</p>
</div>`;
}

</script>

</body>
</html>
