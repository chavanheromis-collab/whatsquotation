<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavan Motors - Quotation</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;margin:0;
}
.container{max-width:450px;width:100%;padding:20px;}
.card{
  background:white;padding:20px;border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
.image-container{
  min-height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.quote-img{
  width:100%;
  max-height:500px;
  object-fit:contain;
}
.btn{
  width:100%;
  padding:15px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:15px;
}
.info-box{
  background:#f8f9fa;
  padding:15px;
  border-radius:12px;
  font-size:13px;
  margin-top:15px;
}
.info-box ol{padding-left:18px;line-height:1.7;}
.loading{
  text-align:center;
  padding:25px;
}
.loading h3{margin-bottom:10px;}
.step{
  margin-top:10px;
  font-size:14px;
  color:#555;
}
.highlight{
  color:#667eea;
  font-weight:bold;
}
.error{text-align:center;padding:20px;}
</style>
</head>

<body>

<div class="container">
<div class="card">
<h2>🚗 Chavan Motors</h2>

<div id="content">

<div class="loading">
  <h3>⏳ Preparing Your Quotation...</h3>
  <p id="loadingText" class="step">🔍 Checking your details...</p>

  <div class="info-box">
    <strong>⚙️ Processing Steps:</strong>
    <ol>
      <li>📱 Verifying your mobile number</li>
      <li>📂 Fetching your quotation data</li>
      <li>🖼️ Preparing images for preview</li>
      <li>🚀 Almost ready...</li>
    </ol>
  </div>
</div>

</div>
</div>
</div>

<script>

// ===== PARAMS =====
const params = new URLSearchParams(window.location.search);
const customer = params.get("cust");
const name = params.get("custname");
const dse = params.get("dse");
const dsemob = params.get("dsemob");

// ===== DYNAMIC LOADING TEXT =====
const loadingMessages = [
  "🔍 Checking your details...",
  "📱 Verifying customer record...",
  "📂 Fetching quotation data...",
  "🖼️ Preparing images...",
  "🚀 Almost ready..."
];

let loadIndex = 0;
const loadingInterval = setInterval(()=>{
  const el = document.getElementById("loadingText");
  if(el){
    el.textContent = loadingMessages[loadIndex];
    loadIndex = (loadIndex + 1) % loadingMessages.length;
  }
},1500);

// ===== DRIVE HANDLER =====
function formatDriveUrls(id) {
  if (!id) return null;
  id = id.trim();

  if (id.startsWith("http")) return { img:id, full:id };

  return {
    img:`https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
    full:`https://drive.google.com/uc?export=view&id=${id}`
  };
}

// ===== FETCH =====
async function fetchSheetData(customerNumber) {
  const apiUrl = "https://script.google.com/macros/s/AKfycbyr70myZuDAfCsVCdPlNcgskFTydg236p6kdNrbnB_1JaFvIRL2ckXbB_zruGk7orrg4w/exec?cust=" + customerNumber;

  const res = await fetch(apiUrl);
  const data = await res.json();

  if (data.error) throw new Error();
  return data;
}

// ===== COUNTDOWN =====
function getRemainingSeconds() {
  if (!window.sheetTimestamp) return 15;

  const created = new Date(window.sheetTimestamp).getTime();
  const now = new Date().getTime();

  return Math.max(15 - Math.floor((now - created)/1000), 0);
}

// ===== INIT =====
init();

async function init() {
  try {
    const data = await fetchSheetData(customer);

    window.fileId1 = data.url1;
    window.fileId2 = data.url2;
    window.fileId3 = data.url3;
    window.sheetTimestamp = data.timestamp;

    clearInterval(loadingInterval);
    loadImages();

  } catch {
    clearInterval(loadingInterval);
    showNoDataInstructions();
  }
}

// ===== LOAD IMAGES =====
function loadImages() {

  const models = [
    {data: formatDriveUrls(fileId1), label:"🚘 Model 1"},
    {data: formatDriveUrls(fileId2), label:"🚘 Model 2"},
    {data: formatDriveUrls(fileId3), label:"🚘 Model 3"}
  ];

  let html = "";

  models.forEach((m,i)=>{
    if(!m.data) return;

    html += `
    <div class="card">
      <h4>${m.label}</h4>
      <div class="image-container" onclick="window.open('${m.data.full}','_blank')">
        <img class="quote-img" src="${m.data.img}">
      </div>
    </div>`;
  });

  html += `
  <div class="card">
    <button class="btn" onclick="sendWhatsApp()">💬 Send WhatsApp</button>

    <div class="info-box">
      <strong>📤 How to share image (NO LINK):</strong>
      <ol>
        <li>👆 Tap image → open full screen</li>
        <li>📱 Long press on image</li>
        <li>📤 Tap Share</li>
        <li>🟢 Select WhatsApp</li>
        <li>✅ Send to customer</li>
      </ol>
    </div>
  </div>`;

  document.getElementById("content").innerHTML = html;

  // ERROR + COUNTDOWN
  document.querySelectorAll(".quote-img").forEach((img,i)=>{
    img.onerror = function(){
      let sec = getRemainingSeconds();
      const parent = this.parentElement;

      parent.innerHTML = `
      <div class="loading">
        ⏳ Preparing image... <br>
        🔄 Retrying in <span id="t${i}">${sec}</span>s
      </div>`;

      const el = document.getElementById(`t${i}`);

      const timer = setInterval(()=>{
        sec--;
        el.textContent = sec;

        if(sec <= 0){
          clearInterval(timer);
          parent.innerHTML = `<img class="quote-img" src="${img.src}">`;
        }
      },1000);
    };
  });
}

// ===== WHATSAPP =====
function sendWhatsApp(){

const message = `🙏 Hello ${name},

Welcome to *Chavan Automobiles* 🚘

Please find your quotation attached 📄.
For any queries, Feel free to Contact.

For quick support, contact:
👤 ${dse || 'Sales Executive'}
📞 ${dsemob || 'Contact Number'}

Thank you for choosing us!
*Chavan Automobiles Team*`;

window.location.href =
`https://wa.me/${customer}?text=${encodeURIComponent(message)}`;
}

// ===== NO DATA =====
function showNoDataInstructions(){
document.getElementById("content").innerHTML =
`
<div class="card">
  <div class="error">
    <h3>⚠️ Quotation Not Found</h3>
    <p>Please follow steps below 👇</p>
  </div>

  <div class="info-box">
    <ol>
      <li>📱 Open AppSheet App</li>
      <li>👤 Select Customer Name</li>
      <li>✏️ Tap Edit (emoji icon)</li>
      <li>💾 Click Save</li>
      <li>🔄 Open link again</li>
    </ol>
  </div>
</div>`;
}

</script>

</body>
</html>
