<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavan Motors - Quotation</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;margin:0;
}
.container{max-width:450px;width:100%;padding:20px;}
.card{
  background:white;padding:20px;border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
.loading{
  text-align:center;
  padding:40px 10px;
}
.loading h1{font-size:22px;margin-bottom:15px;}
.loading p{font-size:18px;color:#555;}

.model-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.image-container{
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.quote-frame{
  position:relative;
  width:100%;
  aspect-ratio: 1000 / 1414;
  background-image:url("https://drive.google.com/thumbnail?id=16gbJoCR6DzFHd9lA55KaeR_1btWKH1b2&sz=w2000");
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center top;
  border-radius:10px;
  overflow:hidden;
}

.qtext{
  position:absolute;
  color:#111;
  font-family:Arial,sans-serif;
  line-height:1.2;
  white-space:pre-wrap;
  word-break:break-word;
}

.small{font-size:1.9vw;}
.medium{font-size:2.15vw;}
.large{font-size:2.35vw;font-weight:bold;}

.btn{
  width:100%;
  padding:15px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.info-box{
  background:#f8f9fa;
  padding:15px;
  border-radius:12px;
  font-size:15px;
  margin-top:15px;
}

.highlight{
  background:#fff3cd;
  color:#856404;
  padding:6px 10px;
  border-radius:8px;
  font-weight:bold;
  display:inline-block;
}

.error{text-align:center;padding:20px;}

@media (min-width: 450px){
  .small{font-size:8px;}
  .medium{font-size:10px;}
  .large{font-size:12px;}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div id="content">
      <div class="loading">
        <h1>⏳ Preparing Your Quotation...</h1>
        <p id="loadingText">🔍 Checking your details...</p>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyr70myZuDAfCsVCdPlNcgskFTydg236p6kdNrbnB_1JaFvIRL2ckXbB_zruGk7orrg4w/exec";

// PARAMS
const params = new URLSearchParams(window.location.search);
const customer = params.get("cust");
const row = params.get("row");
const name = params.get("custname") || "Customer";
const dse = params.get("dse");
const dsemob = params.get("dsemob");

// LOADING TEXT
const msgs = [
  "🔍 Checking your details...",
  "📱 Verifying customer record...",
  "📂 Fetching quotation data...",
  "🖼️ Preparing images...",
  "🚀 Almost ready..."
];

let i=0;
const interval=setInterval(()=>{
  const el=document.getElementById("loadingText");
  if(el){
    el.textContent=msgs[i];
    i=(i+1)%msgs.length;
  }
},1200);

// FETCH
async function fetchData(){
  const url = `${API_URL}?cust=${encodeURIComponent(customer || "")}&row=${encodeURIComponent(row || "")}`;
  const res = await fetch(url);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

// TIME CHECK
function handleTime(timestamp){
  const now = new Date();
  const ts = new Date(timestamp);
  const diff = (now - ts)/1000;

  if(diff < 10){
    let sec = 8;

    document.getElementById("content").innerHTML =
    `<div class="loading">
      <h2>⏳ Generating Quotation...</h2>
      <p>⏱️ Please wait <span id="count">${sec}</span> sec</p>
    </div>`;

    const int = setInterval(()=>{
      sec--;
      const el = document.getElementById("count");
      if(el) el.innerText = sec;
      if(sec <= 0){
        clearInterval(int);
        location.reload();
      }
    },1000);

    return true;
  }

  return false;
}

// INIT
init();

async function init(){
  try{
    const data = await fetchData();
    clearInterval(interval);

    if(handleTime(data.timestamp)) return;

    load(data);

  }catch(err){
    clearInterval(interval);
    console.error(err);
    noData(err.message || "Failed");
  }
}

// LOAD
function load(data){
  let html = "";

  html += renderModel(data.model1, "🚘 Model 1");
  html += renderModel(data.model2, "🚘 Model 2");
  html += renderModel(data.model3, "🚘 Model 3");

  html += `
  <div class="card">
    <button class="btn" onclick="send()">💬 Send WhatsApp</button>

    <div class="info-box">
      <strong>📤 How to share Quotation:</strong>
      <ol>
        <li>👆 Long Press on quotation</li>
        <li>📋 Copy Image / Screenshot</li>
        <li>📤 Share → WhatsApp</li>
        <li>✅ Send</li>
      </ol>
    </div>
  </div>`;

  document.getElementById("content").innerHTML = html;
}

function renderModel(model, label){
  if(!model || !model.model){
    return "";
  }

  return `
  <div class="card">
    <div class="model-title">${label}</div>
    <div class="image-container">
      <div class="quote-frame">

        <div class="qtext medium" style="left:12%;top:10.8%;width:18%;">${esc(model.simpleDate)}</div>
        <div class="qtext medium" style="left:49%;top:10.8%;width:20%;">${esc(model.quoteNo)}</div>

        <div class="qtext medium" style="left:8.8%;top:13.0%;width:28%;">${esc(model.customerName)}</div>
        <div class="qtext small"  style="left:8.8%;top:15.8%;width:28%;">${esc(model.address)}</div>
        <div class="qtext medium" style="left:8.8%;top:18.7%;width:28%;">${esc(model.customerWhatsappNo)}</div>
        <div class="qtext medium" style="left:8.8%;top:21.5%;width:28%;">${esc(model.dseName)}</div>
        <div class="qtext medium" style="left:8.8%;top:24.3%;width:28%;">${esc(model.dseWaNo)}</div>

        <div class="qtext medium" style="left:8.8%;top:28.3%;width:30%;">${esc(model.model)}</div>

        <div class="qtext medium" style="left:44%;top:30.9%;width:12%;text-align:right;">${esc(model.exShowroom)}</div>
        <div class="qtext medium" style="left:44%;top:33.6%;width:12%;text-align:right;">${esc(model.rtoRegi)}</div>
        <div class="qtext medium" style="left:44%;top:36.3%;width:12%;text-align:right;">${esc(model.incidentalCharges)}</div>
        <div class="qtext medium" style="left:44%;top:39.0%;width:12%;text-align:right;">${esc(model.insurance)}</div>
        <div class="qtext medium" style="left:44%;top:41.8%;width:12%;text-align:right;">${esc(model.hypo)}</div>
        <div class="qtext medium" style="left:44%;top:44.5%;width:12%;text-align:right;">${esc(model.accessoriesGood)}</div>
        <div class="qtext large"  style="left:44%;top:47.2%;width:12%;text-align:right;">${esc(model.total)}</div>

        <div class="qtext medium" style="left:58%;top:30.9%;width:11%;text-align:right;">${esc(model.scheme1ExShowroom)}</div>
        <div class="qtext medium" style="left:58%;top:33.6%;width:11%;text-align:right;">${esc(model.scheme1RtoRegi)}</div>
        <div class="qtext medium" style="left:58%;top:36.3%;width:11%;text-align:right;">${esc(model.scheme1IncidentalCharges)}</div>
        <div class="qtext medium" style="left:58%;top:39.0%;width:11%;text-align:right;">${esc(model.scheme1Insurance)}</div>
        <div class="qtext medium" style="left:58%;top:41.8%;width:11%;text-align:right;">${esc(model.scheme1Hypo)}</div>
        <div class="qtext medium" style="left:58%;top:44.5%;width:11%;text-align:right;">${esc(model.scheme1AccessoriesGood)}</div>
        <div class="qtext large"  style="left:58%;top:47.2%;width:11%;text-align:right;">${esc(model.scheme1Total)}</div>

        <div class="qtext medium" style="left:71.5%;top:30.9%;width:11%;text-align:right;">${esc(model.scheme2ExShowroom)}</div>
        <div class="qtext medium" style="left:71.5%;top:33.6%;width:11%;text-align:right;">${esc(model.scheme2RtoRegi)}</div>
        <div class="qtext medium" style="left:71.5%;top:36.3%;width:11%;text-align:right;">${esc(model.scheme2IncidentalCharges)}</div>
        <div class="qtext medium" style="left:71.5%;top:39.0%;width:11%;text-align:right;">${esc(model.scheme2Insurance)}</div>
        <div class="qtext medium" style="left:71.5%;top:41.8%;width:11%;text-align:right;">${esc(model.scheme2Hypo)}</div>
        <div class="qtext medium" style="left:71.5%;top:44.5%;width:11%;text-align:right;">${esc(model.scheme2AccessoriesGood)}</div>
        <div class="qtext large"  style="left:71.5%;top:47.2%;width:11%;text-align:right;">${esc(model.scheme2Total)}</div>

      </div>
    </div>
  </div>`;
}

// WHATSAPP
function send(){
  const msg=`🙏 Hello ${name},

Welcome to *Chavan Automobiles* 🚘

Please find your quotation attached 📄.
For any queries, Feel free to Contact.

For quick support, contact:
👤 ${dse || 'Sales Executive'}
📞 ${dsemob || 'Contact Number'}

Thank you for choosing us!
*Chavan Automobiles Team*`;

  window.location.href=`https://wa.me/${customer}?text=${encodeURIComponent(msg)}`;
}

function esc(v){
  return String(v || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

// NO DATA
function noData(msg){
  document.getElementById("content").innerHTML =
  `<div class="card error">
    <h3>⚠️ Quotation Not Found</h3>
    <p>${esc(msg || "📱 Go to AppSheet → ✏️ Edit → Save → Reopen")}</p>
  </div>`;
}
</script>

</body>
</html>
