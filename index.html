<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavan Motors - Quotation</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;margin:0;
}
.container{max-width:450px;width:100%;padding:20px;}
.card{
  background:white;padding:20px;border-radius:20px;
  margin-bottom:20px;
}
.image-container{
  min-height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.quote-img{
  width:100%;
  max-height:500px;
  object-fit:contain;
}
.btn{
  width:100%;
  padding:15px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:10px;
}
.error{text-align:center;padding:20px;}
</style>
</head>

<body>

<div class="container">
<div class="card">
<h2>🚗 Chavan Motors</h2>
<p>Loading quotations...</p>
<div id="content"></div>
</div>
</div>

<script>

// ===== PARAMS =====
const params = new URLSearchParams(window.location.search);

const customer = params.get("cust");
const name = params.get("custname");
const dse = params.get("dse");
const dsemob = params.get("dsemob");

// ===== DRIVE HANDLER (v1 LOGIC) =====
function formatDriveUrls(id) {
  if (!id) return null;

  id = id.trim();

  if (id.startsWith("http")) {
    return { img: id, full: id };
  }

  return {
    img: `https://drive.google.com/thumbnail?id=${id}&sz=w1000`,
    full: `https://drive.google.com/uc?export=view&id=${id}`
  };
}

// ===== FETCH =====
async function fetchSheetData(customerNumber) {
  const apiUrl = "https://script.google.com/macros/s/AKfycbyr70myZuDAfCsVCdPlNcgskFTydg236p6kdNrbnB_1JaFvIRL2ckXbB_zruGk7orrg4w/exec?cust=" + customerNumber;

  const res = await fetch(apiUrl);
  const data = await res.json();

  if (data.error) throw new Error();

  return data;
}

// ===== COUNTDOWN =====
function getRemainingSeconds() {
  if (!window.sheetTimestamp) return 15;

  const created = new Date(window.sheetTimestamp).getTime();
  const now = new Date().getTime();

  return Math.max(15 - Math.floor((now - created)/1000), 0);
}

// ===== INIT =====
init();

async function init() {
  try {
    const data = await fetchSheetData(customer);

    window.fileId1 = data.url1;
    window.fileId2 = data.url2;
    window.fileId3 = data.url3;
    window.sheetTimestamp = data.timestamp;

    loadImages();

  } catch {
    showError("No quotations found", "Please check customer data");
  }
}

// ===== LOAD IMAGES =====
function loadImages() {

  const models = [
    {data: formatDriveUrls(fileId1), label:"Model 1"},
    {data: formatDriveUrls(fileId2), label:"Model 2"},
    {data: formatDriveUrls(fileId3), label:"Model 3"}
  ];

  let html = "";

  models.forEach((m,i)=>{
    if(!m.data) return;

    html += `
    <div class="card">
      <h4>${m.label}</h4>
      <div class="image-container" onclick="window.open('${m.data.full}','_blank')">
        <img class="quote-img" src="${m.data.img}">
      </div>
    </div>`;
  });

  html += `
  <button class="btn" onclick="sendWhatsApp()">💬 Send WhatsApp</button>`;

  document.getElementById("content").innerHTML = html;

  // ===== ERROR + COUNTDOWN =====
  document.querySelectorAll(".quote-img").forEach((img,i)=>{

    img.onerror = function(){

      let sec = getRemainingSeconds();
      const parent = this.parentElement;

      if(sec <= 0){
        parent.innerHTML = `<img class="quote-img" src="${img.src}">`;
        return;
      }

      parent.innerHTML = `⏳ Retry in <span id="t${i}">${sec}</span>s`;

      const el = document.getElementById(`t${i}`);

      const timer = setInterval(()=>{
        sec--;
        el.textContent = sec;

        if(sec <= 0){
          clearInterval(timer);
          parent.innerHTML = `<img class="quote-img" src="${img.src}">`;
        }
      },1000);
    };

  });
}

// ===== WHATSAPP =====
function sendWhatsApp(){

const msg = `🙏 Hello ${name},

Welcome to *Chavan Automobiles* 🚘

Please find your quotation.

👤 ${dse}
📞 ${dsemob}

Thank you!`;

window.location.href =
  `https://wa.me/${customer}?text=${encodeURIComponent(msg)}`;
}

// ===== ERROR =====
function showError(t,m){
document.getElementById("content").innerHTML =
`<div class="error">
<h3>${t}</h3>
<p>${m}</p>
</div>`;
}

</script>

</body>
</html>
