<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavan Motors - Quotation</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;margin:0;
}
.container{max-width:450px;width:100%;padding:20px;}
.card{
  background:white;padding:20px;border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
}
.loading{
  text-align:center;
  padding:40px 10px;
}
.loading h1{font-size:22px;margin-bottom:15px;}
.loading p{font-size:18px;color:#555;}

.model-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.image-container{
  min-height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.quote-img{
  width:100%;
  height:auto;
  object-fit:contain;
  display:block;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:15px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.info-box{
  background:#f8f9fa;
  padding:15px;
  border-radius:12px;
  font-size:15px;
  margin-top:15px;
}

.highlight{
  background:#fff3cd;
  color:#856404;
  padding:6px 10px;
  border-radius:8px;
  font-weight:bold;
  display:inline-block;
}

.error{text-align:center;padding:20px;}

canvas{
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div id="content">
      <div class="loading">
        <h1>⏳ Preparing Your Quotation...</h1>
        <p id="loadingText">🔍 Checking your details...</p>
      </div>
    </div>
  </div>
</div>

<script>
// ===========================
// CONFIG
// ===========================
const API_URL = "PASTE_YOUR_DEPLOYED_APPS_SCRIPT_WEBAPP_URL_HERE";
const TEMPLATE_IMAGE_URL = "PASTE_YOUR_PUBLIC_TEMPLATE_PNG_URL_HERE";

// PARAMS
const params = new URLSearchParams(window.location.search);
const customer = params.get("cust");
const row = params.get("row");
const name = params.get("custname") || "Customer";
const dse = params.get("dse");
const dsemob = params.get("dsemob");

// LOADING TEXT
const msgs = [
  "🔍 Checking your details...",
  "📱 Verifying customer record...",
  "📂 Fetching quotation data...",
  "🖼️ Preparing images...",
  "🚀 Almost ready..."
];

let i=0;
const interval=setInterval(()=>{
  const el=document.getElementById("loadingText");
  if(el){
    el.textContent=msgs[i];
    i=(i+1)%msgs.length;
  }
},1200);

// FETCH
async function fetchData(){
  const url = `${API_URL}?cust=${encodeURIComponent(customer || "")}&row=${encodeURIComponent(row || "")}`;
  const res = await fetch(url);
  const data = await res.json();
  if(data.error) throw new Error(data.error);
  return data;
}

// TIME CHECK
function handleTime(timestamp){
  const now = new Date();
  const ts = new Date(timestamp);
  const diff = (now - ts)/1000;

  if(diff < 30){
    let sec = 15;

    document.getElementById("content").innerHTML =
    `<div class="loading">
      <h2>⏳ Generating Quotation...</h2>
      <p>⏱️ Please wait <span id="count">${sec}</span> sec</p>
    </div>`;

    const int = setInterval(()=>{
      sec--;
      const countEl = document.getElementById("count");
      if (countEl) countEl.innerText = sec;

      if(sec <= 0){
        clearInterval(int);
        location.reload();
      }
    },1000);

    return true;
  }

  if(diff < 60){
    document.getElementById("content").innerHTML =
    `<div class="card">
      <h3>🚀 Quotation Ready</h3>
      <p>🔄 Please refresh this page</p>
    </div>`;
    return true;
  }

  return false;
}

// INIT
init();

async function init(){
  try{
    const data = await fetchData();
    clearInterval(interval);

    if(handleTime(data.timestamp)) return;

    await load(data);
  }catch(err){
    clearInterval(interval);
    console.error(err);
    noData();
  }
}

// LOAD
async function load(data){
  let html = "";

  html += await renderModel(data.model1, "🚘 Model 1");
  html += await renderModel(data.model2, "🚘 Model 2");
  html += await renderModel(data.model3, "🚘 Model 3");

  html += `
  <div class="card">
    <button class="btn" onclick="send()">💬 Send WhatsApp</button>

    <div class="info-box">
      <strong>📤 How to share Quotation:</strong>
      <ol>
        <li>👆 Long Press on image</li>
        <li>📋 Copy Image</li>
        <li>📤 Share → WhatsApp</li>
        <li>✅ Send</li>
      </ol>
    </div>
  </div>`;

  document.getElementById("content").innerHTML = html;
}

async function renderModel(model, label){
  if(!model || !model.model){
    return "";
  }

  try{
    const imageSrc = await generateQuoteImage(model);

    return `
    <div class="card">
      <div class="model-title">${label}</div>

      <div class="image-container" onclick="window.open('${imageSrc}','_blank')">
        <img class="quote-img" src="${imageSrc}" alt="${label}">
      </div>
    </div>`;
  }catch(err){
    console.error("Render failed:", err);

    return `
    <div class="card">
      <div class="model-title">${label}</div>
      <p>⚠️ Quotation not generated</p>

      <div class="info-box">
        📱 Go to AppSheet → <br><br>
        👉 <span class="highlight">Select Customer ${escapeHtml(name)}</span><br>
        ✏️ Edit → Save → Reopen
      </div>
    </div>`;
  }
}

async function generateQuoteImage(modelData){
  const bg = await loadImage(TEMPLATE_IMAGE_URL);

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = bg.width;
  canvas.height = bg.height;

  ctx.drawImage(bg, 0, 0, bg.width, bg.height);

  // TEXT STYLE
  ctx.fillStyle = "#111111";
  ctx.textBaseline = "middle";
  ctx.font = "24px Arial";

  // TOP INFO
  drawText(ctx, modelData.simpleDate || "", 120, 158);
  drawText(ctx, modelData.quoteNo || "", 520, 158);

  // CUSTOMER INFO
  drawText(ctx, modelData.customerName || "", 90, 186);
  drawWrappedText(ctx, modelData.address || "", 90, 224, 320, 28);
  drawText(ctx, modelData.customerWhatsappNo || "", 90, 262);
  drawText(ctx, modelData.dseName || "", 90, 300);
  drawText(ctx, modelData.dseWaNo || "", 90, 338);

  // MODEL NAME
  drawText(ctx, modelData.model || "", 90, 392);

  // PRICES COLUMN
  ctx.font = "22px Arial";
  drawRightText(ctx, formatMoney(modelData.exShowroom), 560, 430);
  drawRightText(ctx, formatMoney(modelData.rtoRegi), 560, 468);
  drawRightText(ctx, formatMoney(modelData.incidentalCharges), 560, 506);
  drawRightText(ctx, formatMoney(modelData.insurance), 560, 544);
  drawRightText(ctx, formatMoney(modelData.hypo), 560, 582);
  drawRightText(ctx, formatMoney(modelData.accessoriesGood), 560, 620);
  drawRightText(ctx, formatMoney(modelData.total), 560, 658);

  // SCHEME 1
  drawRightText(ctx, formatMoney(modelData.scheme1ExShowroom), 690, 430);
  drawRightText(ctx, formatMoney(modelData.scheme1RtoRegi), 690, 468);
  drawRightText(ctx, formatMoney(modelData.scheme1IncidentalCharges), 690, 506);
  drawRightText(ctx, formatMoney(modelData.scheme1Insurance), 690, 544);
  drawRightText(ctx, formatMoney(modelData.scheme1Hypo), 690, 582);
  drawRightText(ctx, formatMoney(modelData.scheme1AccessoriesGood), 690, 620);
  drawRightText(ctx, formatMoney(modelData.scheme1Total), 690, 658);

  // SCHEME 2
  drawRightText(ctx, formatMoney(modelData.scheme2ExShowroom), 820, 430);
  drawRightText(ctx, formatMoney(modelData.scheme2RtoRegi), 820, 468);
  drawRightText(ctx, formatMoney(modelData.scheme2IncidentalCharges), 820, 506);
  drawRightText(ctx, formatMoney(modelData.scheme2Insurance), 820, 544);
  drawRightText(ctx, formatMoney(modelData.scheme2Hypo), 820, 582);
  drawRightText(ctx, formatMoney(modelData.scheme2AccessoriesGood), 820, 620);
  drawRightText(ctx, formatMoney(modelData.scheme2Total), 820, 658);

  return canvas.toDataURL("image/png");
}

function loadImage(src){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function drawText(ctx, text, x, y){
  ctx.fillText(String(text || ""), x, y);
}

function drawRightText(ctx, text, x, y){
  const val = String(text || "");
  const width = ctx.measureText(val).width;
  ctx.fillText(val, x - width, y);
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight){
  const str = String(text || "");
  if(!str) return;

  const words = str.split(/\s+/);
  let line = "";
  let currentY = y;

  for(const word of words){
    const testLine = line + word + " ";
    const testWidth = ctx.measureText(testLine).width;

    if(testWidth > maxWidth && line){
      ctx.fillText(line.trim(), x, currentY);
      line = word + " ";
      currentY += lineHeight;
    } else {
      line = testLine;
    }
  }

  if(line.trim()){
    ctx.fillText(line.trim(), x, currentY);
  }
}

function formatMoney(val){
  if(val === null || val === undefined || val === "") return "";
  return String(val);
}

function escapeHtml(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// WHATSAPP
function send(){
  const msg=`🙏 Hello ${name},

Welcome to *Chavan Automobiles* 🚘

Please find your quotation attached 📄.
For any queries, Feel free to Contact.

For quick support, contact:
👤 ${dse || 'Sales Executive'}
📞 ${dsemob || 'Contact Number'}

Thank you for choosing us!
*Chavan Automobiles Team*`;

  window.location.href=`https://wa.me/${customer}?text=${encodeURIComponent(msg)}`;
}

// NO DATA
function noData(){
  document.getElementById("content").innerHTML =
  `<div class="card error">
    <h3>⚠️ Quotation Not Found</h3>
    <p>📱 Go to AppSheet → ✏️ Edit → Save → Reopen</p>
  </div>`;
}
</script>

</body>
</html>
